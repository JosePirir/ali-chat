<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Chat Overlay</title>
  <style>
    body {
      background: transparent;
      overflow: hidden;
      margin: 0;
      padding: 8px;
    }

    .chat-message {
      color: white;
      font-size: 20px;
      margin: 5px 0;
      text-shadow: 1px 1px 2px black;
      word-break: break-word;
    }

    .username {
      font-weight: bold;
    }
  </style>
</head>

<body>
  <div id="chat"></div>

  <!-- Usar unpkg en lugar de jsdelivr -->
  <script src="https://unpkg.com/tmi.js@1.8.5/dist/tmi.min.js"></script>

  <script>
    const MAX_MESSAGES = 30;

    const client = new tmi.Client({
      connection: {
        secure: true,
        reconnect: true
      },
      channels: ['4LiiN4CL'] // <-- cambia esto
    });

    client.connect();

    client.on('connected', () => {
      console.log('Conectado a Twitch');
    });

    client.on('message', (channel, tags, message) => {
      const chat = document.getElementById('chat');

      const div = document.createElement('div');
      div.className = 'chat-message';

      const color = tags['color'] || '#FFFFFF';
      div.innerHTML = `<span class="username" style="color:${color}">${tags['display-name']}</span>: ${message}`;

      chat.appendChild(div);

      // Limitar mensajes visibles
      while (chat.children.length > MAX_MESSAGES) {
        chat.removeChild(chat.firstChild);
      }
    });
  </script>
</body>
</html>
