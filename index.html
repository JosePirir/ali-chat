<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Twitch Chat Overlay</title>
  <script src="https://cdn.jsdelivr.net/npm/comfy.js@latest/dist/comfy.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&family=Caveat:wght@700&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: transparent;
      width: 460px;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 16px 20px;
    }

    #chat-container {
      display: flex;
      flex-direction: column;
      gap: 2px;
      max-height: 90vh;
      overflow: hidden;
    }

    /* Wrapper de cada mensaje: username flotando arriba + globo abajo */
    .msg-wrapper {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      margin-bottom: 4px;
    }

    .msg-wrapper.fade-out {
      animation: fadeOut 0.35s ease-in forwards;
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.88) translateY(10px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    @keyframes fadeOut {
      from { opacity: 1; transform: translateY(0); }
      to   { opacity: 0; transform: translateY(-6px); }
    }

    /* Nombre de usuario encima del globo */
    .username-label {
      font-family: 'Montserrat', sans-serif;
      font-size: 13px;
      font-weight: 700;
      color: #e7e3f1;
      margin-left: 22px;
      margin-bottom: -6px;
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      gap: 5px;
      text-shadow: 1px 1px 0 #161315, -1px -1px 0 #161315,
                   1px -1px 0 #161315, -1px 1px 0 #161315;
      letter-spacing: 0.02em;
    }

    .badges img {
      width: 15px;
      height: 15px;
      vertical-align: middle;
    }

    /* Globo de chat */
    .bubble {
      position: relative;
      background: transparent;
      border: 3px solid #584b8b;
      border-radius: 18px 18px 18px 4px;
      padding: 10px 16px 10px 14px;
      max-width: 420px;
      /* ligera sombra para dar profundidad como en el dibujo */
      box-shadow: 3px 3px 0px rgba(88, 75, 139, 0.45);
    }

    /* Rabito del globo, esquina inferior izquierda */
    .bubble::before {
      content: '';
      position: absolute;
      bottom: -14px;
      left: 14px;
      width: 0;
      height: 0;
      border-left: 8px solid transparent;
      border-right: 4px solid transparent;
      border-top: 14px solid #584b8b;
    }
    /* Capa interior del rabito para mantener transparencia */
    .bubble::after {
      content: '';
      position: absolute;
      bottom: -9px;
      left: 16px;
      width: 0;
      height: 0;
      border-left: 6px solid transparent;
      border-right: 3px solid transparent;
      border-top: 10px solid transparent;
    }

    /* Texto del mensaje */
    .msg-text {
      font-family: 'Montserrat', sans-serif;
      font-size: 13px;
      color: #e7e3f1;
      line-height: 1.5;
      word-break: break-word;
    }

    .msg-text img.emote {
      width: 22px;
      height: 22px;
      vertical-align: middle;
      margin: 0 1px;
    }

    /* Estrellita dorada en esquina superior derecha del globo */
    .star {
      position: absolute;
      top: -13px;
      right: -10px;
      color: #ebc188;
      font-size: 22px;
      line-height: 1;
      animation: twinkle 2s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 1; transform: scale(1) rotate(0deg); }
      50%       { opacity: 0.6; transform: scale(0.85) rotate(15deg); }
    }

    #status {
      position: fixed;
      top: 10px;
      right: 10px;
      font-family: 'Caveat', cursive;
      font-size: 13px;
      padding: 3px 10px;
      border-radius: 20px;
      background: rgba(22, 19, 21, 0.75);
      border: 1px solid #584b8b;
      color: #a492c6;
      transition: all 0.3s;
    }
    #status.connected { color: #ebc188; }
    #status.error     { color: #ff6b6b; }
  </style>
</head>
<body>

  <div id="status">● conectando…</div>
  <div id="chat-container"></div>

  <script>
    // ===== CONFIGURACIÓN =====
    const CONFIG = {
      channel:       'tu_canal_aqui',  // <-- cambia esto
      maxMessages:   20,
      messageLifeMs: 30000,            // 30 segundos por mensaje
    };
    // =========================

    const container = document.getElementById('chat-container');
    const statusEl  = document.getElementById('status');

    const palette = [
      '#9146ff','#00b5ad','#e91e8c','#ff6b35',
      '#00c8ff','#f5c518','#43e97b','#fa709a',
    ];
    const userColorMap = {};

    function resolveColor(username, twitchColor) {
      if (twitchColor && twitchColor !== '#000000') return twitchColor;
      if (!userColorMap[username]) {
        const idx = [...username].reduce((a, c) => a + c.charCodeAt(0), 0) % palette.length;
        userColorMap[username] = palette[idx];
      }
      return userColorMap[username];
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    // Parsea emotes usando extra.messageEmotes  { "id": ["s-e", ...] }
    function buildMessageHtml(rawText, emotes) {
      if (!emotes || Object.keys(emotes).length === 0) return escapeHtml(rawText);
      const parts = [];
      for (const [id, positions] of Object.entries(emotes)) {
        for (const pos of positions) {
          const [s, e] = pos.split('-').map(Number);
          parts.push({ s, e, id, name: rawText.slice(s, e + 1) });
        }
      }
      parts.sort((a, b) => a.s - b.s);
      let html = '', cursor = 0;
      for (const r of parts) {
        if (r.s > cursor) html += escapeHtml(rawText.slice(cursor, r.s));
        html += `<img class="emote" src="https://static-cdn.jtvnw.net/emoticons/v2/${r.id}/default/dark/1.0" alt="${escapeHtml(r.name)}" title="${escapeHtml(r.name)}">`;
        cursor = r.e + 1;
      }
      if (cursor < rawText.length) html += escapeHtml(rawText.slice(cursor));
      return html;
    }

    // Badges: ComfyJS expone extra.userBadges como array [{url, title}] o como objeto
    function buildBadgesHtml(userBadges) {
      if (!userBadges) return '';
      if (Array.isArray(userBadges)) {
        return userBadges.filter(b => b && b.url)
          .map(b => `<img src="${b.url}" alt="${b.title || 'badge'}" title="${b.title || 'badge'}">`)
          .join('');
      }
      // Fallback con URLs estáticas conocidas
      const known = {
        broadcaster: 'https://static-cdn.jtvnw.net/badges/v1/5527c58c-fb7d-422d-b71b-f309dcb85cc1/1',
        moderator:   'https://static-cdn.jtvnw.net/badges/v1/3267646d-33f0-4b17-b3df-f923a41db1d0/1',
        subscriber:  'https://static-cdn.jtvnw.net/badges/v1/5d9f2208-5dd8-11e7-8513-2ff4adfae661/1',
        vip:         'https://static-cdn.jtvnw.net/badges/v1/b817aba4-fad8-49e2-b88a-7cc744dfa6ec/1',
      };
      return Object.keys(userBadges).filter(k => known[k])
        .map(k => `<img src="${known[k]}" alt="${k}" title="${k}">`)
        .join('');
    }

    function addMessage(user, message, flags, extra) {
      const color      = resolveColor(user, extra.userColor);
      const displayName = escapeHtml(extra.displayName || user);
      const badgesHtml  = buildBadgesHtml(extra.userBadges);
      const msgHtml     = buildMessageHtml(message, extra.messageEmotes);

      const wrapper = document.createElement('div');
      wrapper.className = 'msg-wrapper';
      wrapper.style.setProperty('--user-color', color);
      wrapper.innerHTML = `
        <div class="username-label">
          ${badgesHtml ? `<span class="badges">${badgesHtml}</span>` : ''}
          ${displayName}
        </div>
        <div class="bubble">
          <span class="star">✦</span>
          <div class="msg-text">${msgHtml}</div>
        </div>
      `;

      container.appendChild(wrapper);
      while (container.children.length > CONFIG.maxMessages)
        container.removeChild(container.firstChild);

      setTimeout(() => {
        wrapper.classList.add('fade-out');
        wrapper.addEventListener('animationend', () => wrapper.remove(), { once: true });
      }, CONFIG.messageLifeMs);
    }

    // ===== Eventos ComfyJS =====

    ComfyJS.onChat = (user, message, flags, self, extra) => {
      if (self) return;
      addMessage(user, message, flags, extra);
    };

    ComfyJS.onCommand = (user, command, message, flags, extra) => {
      // Muestra también los comandos de chat (!comando)
      addMessage(user, '!' + command + (message ? ' ' + message : ''), flags, extra);
    };

    ComfyJS.onConnected = (address, port, isFirstConnect) => {
      statusEl.textContent = '● conectado';
      statusEl.className = 'connected';
      setTimeout(() => { statusEl.style.opacity = '0'; }, 3000);
    };

    ComfyJS.onError = (err) => {
      statusEl.style.opacity = '1';
      statusEl.textContent = '● error de conexión';
      statusEl.className = 'error';
      console.error('ComfyJS error:', err);
    };

    ComfyJS.onReconnect = (reconnectCount) => {
      statusEl.style.opacity = '1';
      statusEl.textContent = `● reconectando… (${reconnectCount})`;
      statusEl.className = '';
    };

    // Init sin OAuth = solo lectura del chat (suficiente para overlay)
    ComfyJS.Init(CONFIG.channel);
  </script>
</body>
</html>
